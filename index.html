<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LEVELIS</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --red:#E8312A;--red2:#ff4b43;
    --gold:#F5C518;--silver:#C0C0C0;--bronze:#CD7F32;
    --plat:#4FC3F7;--diam:#AB47BC;--immo:#FF7043;
    --bg:#111111;--bg2:#1a1a1a;--bg3:#222222;
    --border:#2a2a2a;--border2:#333;
    --text:#f0f0f0;--text2:#aaa;--text3:#555;
  }

  /* ════════════════════════════════════════════════════
     SYSTÈME DE THÈME — logique HSL uniforme
     Clair  : H 30% sat, L 91/95/86% (fond clair et aéré)
     Accent clair  : H 55% sat, L 36% → 48%
     ════════════════════════════════════════════════════ */

  /* ── Mode clair neutre (sans accent) ── */
  body.mode-light {
    --bg:hsl(0,0%,91%); --bg2:hsl(0,0%,96%); --bg3:hsl(0,0%,85%);
    --border:hsl(0,0%,80%); --border2:hsl(0,0%,70%);
    --text:hsl(0,0%,10%); --text2:hsl(0,0%,36%); --text3:hsl(0,0%,60%);
    --red:hsl(0,72%,42%); --red2:hsl(0,72%,52%);
    --del-hover-bg:hsl(0,60%,95%);
    --cat-physique-bg:hsl(122,30%,88%);  --cat-physique-text:hsl(122,45%,22%);
    --cat-spirituel-bg:hsl(231,30%,88%); --cat-spirituel-text:hsl(231,45%,22%);
    --cat-discipline-bg:hsl(14,30%,88%); --cat-discipline-text:hsl(14,45%,22%);
    --cat-travail-bg:hsl(187,30%,88%);   --cat-travail-text:hsl(187,45%,22%);
    --cat-mental-bg:hsl(4,30%,88%);      --cat-mental-text:hsl(4,45%,22%);
  }

  /* ── Accents sombre : seule la couleur dominante change ── */
  body.accent-rose   { --red:hsl(330,70%,55%); --red2:hsl(330,70%,65%); }
  body.accent-blue   { --red:hsl(211,70%,55%); --red2:hsl(211,70%,65%); }
  body.accent-yellow { --red:hsl(38,82%,46%);  --red2:hsl(38,82%,56%);  }
  body.accent-violet { --red:hsl(262,70%,55%); --red2:hsl(262,70%,65%); }
  body.accent-green  { --red:hsl(152,60%,40%); --red2:hsl(152,60%,50%); }

  /* ── Accents clair : fond pastel clair + accent + cat-pills ── */
  body.mode-light.accent-rose {
    --bg:hsl(345,40%,91%); --bg2:hsl(345,40%,96%); --bg3:hsl(345,40%,85%);
    --border:hsl(345,30%,78%); --border2:hsl(345,30%,66%);
    --text:hsl(345,40%,12%); --text2:hsl(345,28%,38%); --text3:hsl(345,18%,60%);
    --red:hsl(330, 72%, 60%); --red2:hsl(330, 68%, 55%);
    --del-hover-bg:hsl(345,50%,96%);
    --cat-physique-bg:hsl(122,28%,88%);  --cat-physique-text:hsl(122,42%,20%);
    --cat-spirituel-bg:hsl(231,28%,88%); --cat-spirituel-text:hsl(231,42%,20%);
    --cat-discipline-bg:hsl(14,28%,88%); --cat-discipline-text:hsl(14,42%,20%);
    --cat-travail-bg:hsl(187,28%,88%);   --cat-travail-text:hsl(187,42%,20%);
    --cat-mental-bg:hsl(4,28%,88%);      --cat-mental-text:hsl(4,42%,20%);
  }
  body.mode-light.accent-blue {
    --bg:hsl(211,40%,91%); --bg2:hsl(211,40%,96%); --bg3:hsl(211,40%,84%);
    --border:hsl(211,30%,76%); --border2:hsl(211,30%,64%);
    --text:hsl(211,40%,10%); --text2:hsl(211,28%,34%); --text3:hsl(211,18%,58%);
    --red:hsl(211, 65%, 49%); --red2:hsl(211,62%,46%);
    --del-hover-bg:hsl(211,50%,96%);
    --cat-physique-bg:hsl(122,28%,88%);  --cat-physique-text:hsl(122,42%,20%);
    --cat-spirituel-bg:hsl(231,28%,88%); --cat-spirituel-text:hsl(231,42%,20%);
    --cat-discipline-bg:hsl(14,28%,88%); --cat-discipline-text:hsl(14,42%,20%);
    --cat-travail-bg:hsl(187,28%,88%);   --cat-travail-text:hsl(187,42%,20%);
    --cat-mental-bg:hsl(4,28%,88%);      --cat-mental-text:hsl(4,42%,20%);
  }
  body.mode-light.accent-yellow {
    --bg:hsl(46,55%,88%); --bg2:hsl(46,55%,93%); --bg3:hsl(46,55%,82%);
    --border:hsl(46,40%,74%); --border2:hsl(46,40%,62%);
    --text:hsl(46,60%,10%); --text2:hsl(46,38%,30%); --text3:hsl(46,22%,54%);
    --red:hsl(41, 100%, 63%); --red2:hsl(32,72%,46%);
    --del-hover-bg:hsl(46,55%,96%);
    --cat-physique-bg:hsl(122,28%,88%);  --cat-physique-text:hsl(122,42%,20%);
    --cat-spirituel-bg:hsl(231,28%,88%); --cat-spirituel-text:hsl(231,42%,20%);
    --cat-discipline-bg:hsl(14,28%,88%); --cat-discipline-text:hsl(14,42%,20%);
    --cat-travail-bg:hsl(187,28%,88%);   --cat-travail-text:hsl(187,42%,20%);
    --cat-mental-bg:hsl(4,28%,88%);      --cat-mental-text:hsl(4,42%,20%);
  }
  body.mode-light.accent-violet {
    --bg:hsl(262,32%,91%); --bg2:hsl(262,32%,96%); --bg3:hsl(262,32%,84%);
    --border:hsl(262,24%,76%); --border2:hsl(262,24%,64%);
    --text:hsl(262,40%,10%); --text2:hsl(262,26%,34%); --text3:hsl(262,16%,58%);
    --red:hsl(262, 60%, 50%); --red2:hsl(262,62%,52%);
    --del-hover-bg:hsl(262,45%,96%);
    --cat-physique-bg:hsl(122,28%,88%);  --cat-physique-text:hsl(122,42%,20%);
    --cat-spirituel-bg:hsl(231,28%,88%); --cat-spirituel-text:hsl(231,42%,20%);
    --cat-discipline-bg:hsl(14,28%,88%); --cat-discipline-text:hsl(14,42%,20%);
    --cat-travail-bg:hsl(187,28%,88%);   --cat-travail-text:hsl(187,42%,20%);
    --cat-mental-bg:hsl(4,28%,88%);      --cat-mental-text:hsl(4,42%,20%);
  }
  body.mode-light.accent-green {
    --bg:hsl(152,32%,90%); --bg2:hsl(152,32%,95%); --bg3:hsl(152,32%,83%);
    --border:hsl(152,24%,74%); --border2:hsl(152,24%,62%);
    --text:hsl(152,40%,8%); --text2:hsl(152,26%,28%); --text3:hsl(152,16%,52%);
    --red:hsl(152, 58%, 36%); --red2:hsl(152,55%,38%);
    --del-hover-bg:hsl(152,40%,95%);
    --cat-physique-bg:hsl(122,28%,88%);  --cat-physique-text:hsl(122,42%,20%);
    --cat-spirituel-bg:hsl(231,28%,88%); --cat-spirituel-text:hsl(231,42%,20%);
    --cat-discipline-bg:hsl(14,28%,88%); --cat-discipline-text:hsl(14,42%,20%);
    --cat-travail-bg:hsl(187,28%,88%);   --cat-travail-text:hsl(187,42%,20%);
    --cat-mental-bg:hsl(4,28%,88%);      --cat-mental-text:hsl(4,42%,20%);
  }
  html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif}
  h1,h2,h3{font-family:'Bebas Neue',sans-serif;letter-spacing:1px}

  /* HEADER */
  .header{
    display:flex;align-items:center;justify-content:space-between;
    padding:16px 24px 0;
  }
  .header h1{font-size:28px;color:var(--red);letter-spacing:2px}
  .save-indicator{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:6px}
  .save-dot{width:7px;height:7px;border-radius:50%;background:var(--text3);transition:background .4s}
  .save-dot.saved{background:#4CAF50}
  .save-dot.saving{background:#FF9800}

  .app{padding:12px 24px 32px}

  /* TABS */
  .tabs{display:flex;gap:6px;margin-bottom:20px;border-bottom:2px solid var(--border)}
  .tab{padding:8px 20px;cursor:pointer;font-size:14px;font-weight:500;border:none;background:transparent;color:var(--text2);border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .2s}
  .tab.active{color:var(--red);border-bottom-color:var(--red)}
  .tab:hover{color:var(--text)}

  .panel{display:none}.panel.active{display:block}

  /* SUMMARY CARDS */
  .summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:20px}
  .scard{background:var(--bg2);border:0.5px solid var(--border);border-radius:10px;padding:12px 14px;text-align:center}
  .scard .cat-dot{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:5px}
  .scard .cat-label{font-size:11px;color:var(--text2);font-weight:500;text-transform:uppercase;letter-spacing:.5px}
  .scard .xp-val{font-size:22px;font-weight:500;font-family:'Bebas Neue',sans-serif;line-height:1.1;margin:4px 0 2px}
  .scard .rank-badge{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500;display:inline-block}
  .scard .xp-max{font-size:11px;color:var(--text3)}

  .r-hors{background:#888;color:#fff}.r-bronze{background:#CD7F32;color:#fff}
  .r-argent{background:#999;color:#222}.r-or{background:#F5C518;color:#333}
  .r-platine{background:#4FC3F7;color:#fff}.r-diamant{background:#AB47BC;color:#fff}
  .r-immortal{background:#FF7043;color:#fff}

  /* Base pill — fully round, applies everywhere */
  .rank-badge{
    display:inline-block; border-radius:999px;
    font-size:11px; font-weight:700; padding:2px 10px;
    letter-spacing:.3px;
  }

  .prog-wrap{margin:4px 0 2px;background:var(--border);border-radius:4px;height:5px;overflow:hidden}
  .prog-bar{height:100%;border-radius:4px;transition:width .4s}

  /* HERO */
  .hero{background:var(--red);color:#fff;border-radius:12px;padding:18px 24px;margin-bottom:20px;display:flex;align-items:center;gap:18px}
  .hero-xp{font-size:56px;font-family:'Bebas Neue',sans-serif;line-height:1}
  .hero .label{font-size:12px;opacity:.8;text-transform:uppercase;letter-spacing:.5px}
  .hero-badge{font-size:14px;padding:4px 14px;border-radius:20px;font-weight:500;background:rgba(255,255,255,.2);color:#fff;margin-top:6px;display:inline-block}
  .hero-right{margin-left:auto;text-align:right}
  .hero-pct{font-size:13px;opacity:.8}

  /* TASKS */
  .task-section{margin-bottom:22px}
  .task-section-header{display:flex;align-items:center;gap:10px;margin-bottom:8px;padding-bottom:6px;border-bottom:2px solid var(--border)}
  .task-section-header h3{font-size:18px}
  .cat-pill{font-size:11px;padding:2px 10px;border-radius:20px;font-weight:500}

  .dot-btn{width:26px;height:26px;border-radius:50%;border:2px solid;cursor:pointer;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;transition:all .15s;background:transparent}
  .dot-btn.red{border-color:#e24b4a;color:#e24b4a}.dot-btn.red.active{background:#e24b4a;color:#fff}
  .dot-btn.ora{border-color:#FF9800;color:#FF9800}.dot-btn.ora.active{background:#FF9800;color:#fff}
  .dot-btn.grn{border-color:#4CAF50;color:#4CAF50}.dot-btn.grn.active{background:#4CAF50;color:#fff}
  .del-btn{width:26px;height:26px;border-radius:50%;border:0.5px solid var(--border);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;background:transparent;color:var(--text3);transition:all .15s}
  .del-btn:hover{background:var(--del-hover-bg,#2a1010);color:#e24b4a}

  /* ADD FORM */
  .add-form{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;padding:12px;background:var(--bg2);border-radius:10px;border:0.5px solid var(--border)}
  .add-form input,.add-form select{flex:1;min-width:120px;height:34px;border:0.5px solid var(--border2);border-radius:8px;padding:0 10px;font-size:13px;background:var(--bg3);color:var(--text)}
  .add-form input:focus,.add-form select:focus{outline:none;border-color:var(--red)}
  .add-form button{height:34px;padding:0 16px;border-radius:8px;border:none;background:var(--red);color:#fff;font-size:13px;font-weight:500;cursor:pointer}
  .add-form button:hover{background:var(--red2)}

  /* RANK TABLE */
  .rank-table{width:100%;border-collapse:collapse;font-size:13px}
  .rank-table th{text-align:left;padding:8px 10px;font-weight:500;color:var(--text2);border-bottom:0.5px solid var(--border);font-size:12px;text-transform:uppercase;letter-spacing:.5px}
  .rank-table td{padding:8px 10px;border-bottom:0.5px solid var(--border)}
  .rank-table tr:last-child td{border-bottom:none}
  .rank-name{padding:3px 10px;border-radius:20px;font-size:12px;font-weight:500}

  .week-nav{display:flex;align-items:center;gap:12px;margin-bottom:16px}
  .week-nav button{border:0.5px solid var(--border2);background:var(--bg2);border-radius:8px;padding:6px 14px;cursor:pointer;color:var(--text);font-size:13px;transition:all .15s}
  .week-nav button:hover{border-color:var(--red);color:var(--red)}
  .week-nav .week-label{font-size:14px;font-weight:500}

  /* TASK GRID */
  .task-table-wrap{overflow-x:auto;margin-bottom:4px}
  .task-grid{width:100%;border-collapse:separate;border-spacing:0 3px;min-width:600px;table-layout:fixed}
  .task-grid colgroup col.col-name{width:180px}
  .task-grid colgroup col.col-day{width:64px}
  .task-grid colgroup col.col-xp{width:72px}

  /* Header row */
  .task-grid thead th{padding:2px 3px;font-size:9px;color:var(--text3);font-weight:400;text-align:center;border:none;background:transparent;letter-spacing:.3px}
  .task-grid thead th:first-child{text-align:left;padding-left:10px}
  .task-grid thead th:last-child{text-align:right;padding-right:8px}

  /* Body rows */
  .task-grid tbody td{background:var(--bg2);border-top:0.5px solid var(--border);border-bottom:0.5px solid var(--border);padding:0}
  .task-grid tbody td:first-child{padding:7px 10px;font-size:13px;font-weight:500;border-left:0.5px solid var(--border);border-radius:8px 0 0 8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .task-grid tbody td:last-child{padding:7px 8px;text-align:right;border-right:0.5px solid var(--border);border-radius:0 8px 8px 0;font-size:13px;font-weight:500;white-space:nowrap}
  .task-grid .day-cell{padding:4px 3px;text-align:center;vertical-align:middle}
  .day-btns{display:flex;gap:2px;justify-content:center;align-items:center}

  /* MANAGE TASK ROW */
  .manage-row{display:grid;grid-template-columns:1fr auto auto;align-items:center;gap:8px;padding:9px 12px 9px 14px;border-radius:8px;margin-bottom:4px;background:var(--bg2);border:0.5px solid var(--border);transition:border-color .15s,background .15s}
  .manage-row:hover{border-color:var(--border2);background:var(--bg3)}
  .manage-row .task-name{font-size:13px;font-weight:500;color:var(--text)}
  .manage-row select{font-size:12px;padding:3px 8px;border-radius:6px;border:0.5px solid var(--border2);background:var(--bg3);color:var(--text2);transition:border-color .15s}
  .manage-row select:focus{outline:none;border-color:var(--red)}

  /* MANAGE PANEL LAYOUT */
  .manage-section-block{margin-bottom:24px}
  .manage-section-title{
    display:flex;align-items:center;justify-content:space-between;
    margin-bottom:12px;padding-bottom:10px;
    border-bottom:1px solid var(--border);
  }
  .manage-section-title span{
    font-size:11px;font-weight:600;color:var(--text3);
    text-transform:uppercase;letter-spacing:.9px;
  }
  .manage-section-title-btn{
    font-size:12px;padding:4px 12px;border-radius:6px;border:none;
    background:var(--red);color:#fff;cursor:pointer;
    font-family:'DM Sans',sans-serif;font-weight:500;
    transition:background .15s,opacity .15s;
  }
  .manage-section-title-btn:hover{opacity:.85}

  /* CAT MANAGE ROW — redesigned */
  .cat-manage-row-new{
    display:flex;align-items:center;gap:10px;flex-wrap:wrap;
    padding:10px 12px;border-radius:10px;margin-bottom:6px;
    background:var(--bg2);border:0.5px solid var(--border);
    border-left:3px solid transparent;
    transition:border-color .15s,background .15s;
  }
  .cat-manage-row-new:hover{background:var(--bg3)}
  .cat-swatch-new{width:22px;height:22px;border-radius:50%;cursor:pointer;flex-shrink:0;border:2px solid rgba(255,255,255,.1);transition:transform .15s,box-shadow .15s}
  .cat-swatch-new:hover{transform:scale(1.2);box-shadow:0 0 0 3px rgba(255,255,255,.15)}
  .cat-name-new{font-size:13px;font-weight:600;flex:1;color:var(--text)}
  .cat-count-pill{font-size:11px;padding:2px 8px;border-radius:20px;background:var(--bg3);color:var(--text3);border:0.5px solid var(--border2);white-space:nowrap}
  .cat-actions-new{display:flex;gap:4px}
  .cat-act-btn{width:26px;height:26px;border-radius:6px;border:0.5px solid var(--border2);background:transparent;color:var(--text3);cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;transition:all .15s;line-height:1}
  .cat-act-btn:hover{background:var(--bg3);color:var(--text);border-color:var(--border2)}
  .cat-act-del:hover{background:var(--del-hover-bg,#2a1010)!important;color:#e24b4a!important;border-color:#e24b4a!important}
  .cat-act-del.disabled{opacity:.3;cursor:not-allowed}
  .cat-act-del.disabled:hover{background:transparent!important;color:var(--text3)!important;border-color:var(--border2)!important}

  /* TASK SECTION (par catégorie) */
  .manage-cat-block{margin-bottom:20px}
  .manage-cat-header{
    display:flex;align-items:center;gap:8px;
    padding:8px 12px;border-radius:8px 8px 0 0;
    border-left:3px solid;
    background:var(--bg2);border-top:0.5px solid var(--border);
    border-right:0.5px solid var(--border);
  }
  .manage-cat-header h3{font-size:14px;font-weight:700;letter-spacing:.3px;flex:1}
  .manage-cat-header .cat-pill{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500}
  .manage-task-list{border:0.5px solid var(--border);border-top:none;border-radius:0 0 8px 8px;overflow:hidden}
  .manage-task-list .manage-row{border-radius:0;border-left:none;border-right:none;border-top:none;margin-bottom:0}
  .manage-task-list .manage-row:last-child{border-bottom:none}
  .manage-task-list .manage-row:hover{background:var(--bg3)}
  .manage-empty-cat{padding:12px;text-align:center;font-size:12px;color:var(--text3);background:var(--bg2);font-style:italic}

  /* ADD FORM redesigned */
  .manage-add-form{
    display:flex;gap:8px;flex-wrap:wrap;
    padding:14px;background:var(--bg2);
    border-radius:10px;border:0.5px solid var(--border);
    align-items:center;
  }
  .manage-add-form input,.manage-add-form select{
    flex:1;min-width:120px;height:36px;
    border:0.5px solid var(--border2);border-radius:8px;
    padding:0 12px;font-size:13px;background:var(--bg3);color:var(--text);
    transition:border-color .15s;
    font-family:'DM Sans',sans-serif;
  }
  .manage-add-form input:focus,.manage-add-form select:focus{outline:none;border-color:var(--red)}
  .manage-add-form input::placeholder{color:var(--text3)}
  .manage-add-form button{
    height:36px;padding:0 18px;border-radius:8px;border:none;
    background:var(--red);color:#fff;font-size:13px;font-weight:600;
    cursor:pointer;font-family:'DM Sans',sans-serif;
    transition:opacity .15s;white-space:nowrap;
  }
  .manage-add-form button:hover{opacity:.85}

  /* COLOR PICKER redesigned */
  .color-picker-popup-new{
    margin-top:10px;padding:16px;
    background:var(--bg3);border:1px solid var(--border2);
    border-radius:12px;
  }
  .color-picker-popup-new .cp-title{font-size:13px;font-weight:600;margin-bottom:12px;color:var(--text2)}
  .color-picker-popup-new .cp-title b{color:var(--text)}
  .cp-swatches{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:12px}
  .cp-custom-row{display:flex;gap:10px;align-items:center;padding-top:10px;border-top:0.5px solid var(--border)}
  .cp-custom-row label{font-size:12px;color:var(--text3)}
  .cp-btns{display:flex;gap:6px;margin-left:auto}
  .cp-btn-apply{height:30px;padding:0 14px;border-radius:6px;border:none;background:var(--red);color:#fff;font-size:12px;font-weight:600;cursor:pointer;transition:opacity .15s}
  .cp-btn-apply:hover{opacity:.85}
  .cp-btn-cancel{height:30px;padding:0 12px;border-radius:6px;border:0.5px solid var(--border2);background:transparent;color:var(--text2);font-size:12px;cursor:pointer;transition:all .15s}
  .cp-btn-cancel:hover{border-color:var(--text2);color:var(--text)}

  /* MANAGE PAGE TITLE */
  .manage-page-title{font-size:22px;margin-bottom:20px;color:var(--text)}

  /* SCROLLBAR */
  ::-webkit-scrollbar{width:5px;height:5px}
  ::-webkit-scrollbar-track{background:var(--bg)}
  ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
  select option{background:var(--bg3);color:var(--text)}

  /* ── SETTINGS PANEL ── */
  .settings-section{margin-bottom:28px}
  .settings-section h3{font-size:16px;font-family:'DM Sans',sans-serif;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.8px;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--border)}
  .theme-toggle{display:flex;gap:10px}
  .theme-btn{flex:1;padding:10px 16px;border-radius:10px;border:1.5px solid var(--border2);cursor:pointer;font-size:13px;font-weight:500;font-family:'DM Sans',sans-serif;background:var(--bg2);color:var(--text2);transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px}
  .theme-btn:hover{border-color:var(--red);color:var(--text)}
  .theme-btn.active{border-color:var(--red);background:var(--red);color:#fff}
  .palette-row{display:flex;gap:14px;align-items:center;flex-wrap:wrap}
  .palette-btn{width:38px;height:38px;border-radius:50%;border:3px solid transparent;cursor:pointer;transition:all .2s;outline:none;position:relative}
  .palette-btn:hover{transform:scale(1.1)}
  .palette-btn.active{border-color:var(--text);box-shadow:0 0 0 2px var(--bg),0 0 0 4px var(--text)}
  .palette-btn.active::after{content:'✓';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.4)}

  /* CATEGORY MANAGEMENT */
  .cat-manage-list{display:flex;flex-direction:column;gap:6px;margin-bottom:4px}
  .cat-manage-row{display:grid;grid-template-columns:28px 1fr auto 60px;grid-template-rows:auto auto;align-items:center;gap:6px 8px;padding:10px 12px;border-radius:10px;background:var(--bg2);border:0.5px solid var(--border);transition:border-color .15s}
  .cat-manage-row:hover{border-color:var(--border2)}
  .cat-color-swatch{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2px solid rgba(255,255,255,.15);transition:transform .15s;flex-shrink:0}
  .cat-color-swatch:hover{transform:scale(1.15)}
  .cat-name-display{font-size:14px;font-weight:500;color:var(--text)}
  .cat-manage-actions{display:flex;gap:4px;align-items:center}
  .cat-action-btn{width:28px;height:28px;border-radius:6px;border:0.5px solid var(--border2);background:var(--bg3);color:var(--text2);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:all .15s}
  .cat-action-btn:hover{background:var(--border2);color:var(--text)}
  .cat-del-btn:hover{background:var(--del-hover-bg,#2a1010)!important;color:#e24b4a!important;border-color:#e24b4a!important}
  .cat-del-btn.disabled{opacity:.35;cursor:not-allowed}
  .cat-del-btn.disabled:hover{background:var(--bg3)!important;color:var(--text2)!important;border-color:var(--border2)!important}
  .cat-task-count{font-size:11px;color:var(--text3);text-align:right}
  .cat-edit-inline{display:flex;gap:6px;align-items:center;grid-column:1/-1;width:100%}

  /* SUMMARY HORIZONTAL SCROLL (extra categories) */
  .summary-scroll-wrap{overflow:hidden;position:relative;margin-bottom:20px}
  .summary-scroll-wrap::after{content:'';position:absolute;right:0;top:0;bottom:0;width:40px;background:linear-gradient(to right,transparent,var(--bg));pointer-events:none}
  .summary-scroll{display:flex;gap:10px;overflow-x:auto;padding-bottom:4px;scroll-behavior:smooth;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .summary-scroll::-webkit-scrollbar{display:none}
  .scard-scroll{flex:0 0 160px;min-width:160px;text-align:center}
  .scard-scroll .cat-label{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

  /* ── Affichage conditionnel desktop / mobile ── */
  .task-mobile  { display:none }
  .task-desktop { display:block }

  /* ── Vue cartes mobile (structure) ── */
  .m-task-card {
    background:var(--bg2); border:0.5px solid var(--border);
    border-radius:10px; padding:10px 12px; margin-bottom:8px;
  }
  .m-task-header {
    display:flex; justify-content:space-between; align-items:center;
    margin-bottom:10px;
  }
  .m-task-name { font-size:13px; font-weight:600; flex:1; padding-right:8px }
  .m-task-xp   { font-family:'Bebas Neue',sans-serif; font-size:16px; font-weight:700; white-space:nowrap }
  .m-days-row  { display:grid; grid-template-columns:repeat(7,1fr); gap:4px }
  .m-day-col   { display:flex; flex-direction:column; align-items:center; gap:3px }
  .m-day-label { font-size:9px; color:var(--text3); font-weight:600; text-transform:uppercase; letter-spacing:.3px }
  .m-day-btns  { display:flex; flex-direction:column; gap:3px }

  /* ── Éléments nav : masqués par défaut (PC) ── */
  .tab-icon  { display:none }
  .tab-short { display:none }

  /* safe area iPhone */
  @supports(padding:max(0px)){
    body { padding-bottom:env(safe-area-inset-bottom) }
  }

  /* ══════════════════════════════════════════════════════
     MOBILE ≤ 640px — rien de PC n'est touché
     ══════════════════════════════════════════════════════ */
  @media(max-width:640px){

    .header { padding:12px 14px 0 }
    .header h1 { font-size:22px }
    .save-indicator { font-size:10px }
    .app { padding:10px 12px 90px }

    /* Navigation fixe en bas */
    .tabs {
      position:fixed; bottom:0; left:0; right:0;
      display:grid; grid-template-columns:repeat(4,1fr);
      gap:0; margin-bottom:0; border-bottom:none;
      border-top:1px solid var(--border2);
      background:var(--bg2); z-index:200;
      padding-bottom:env(safe-area-inset-bottom,0px);
      box-shadow:0 -4px 24px rgba(0,0,0,.35);
    }
    .tab {
      padding:8px 2px 6px; font-size:0;
      border-bottom:none; border-top:3px solid transparent;
      margin-bottom:0;
      display:flex; flex-direction:column; align-items:center; gap:2px;
      border-radius:0;
    }
    .tab.active { border-top-color:var(--red); border-bottom:none }
    .tab-icon  { display:block; font-size:20px; line-height:1 }
    .tab-full  { display:none }
    .tab-short { display:block; font-size:10px; font-weight:600; color:var(--text2); line-height:1 }
    .tab.active .tab-short { color:var(--red) }

    /* Hero */
    .hero { padding:12px 14px; gap:10px; border-radius:10px; margin-bottom:12px }
    .hero-xp { font-size:44px }
    .hero .label { font-size:10px }
    .hero-badge { font-size:12px; padding:3px 10px; margin-top:3px }

    /* Week nav */
    .week-nav { gap:8px; margin-bottom:10px }
    .week-nav button { padding:0 12px; height:40px; font-size:14px; border-radius:10px }
    .week-nav .week-label { font-size:12px; text-align:center; flex:1 }

    /* Summary cards 2 colonnes */
    .summary-grid { grid-template-columns:repeat(2,1fr); gap:8px; margin-bottom:12px }
    .scard { padding:10px 10px }
    .scard .xp-val { font-size:20px }
    .scard .cat-label { font-size:9.5px }
    .scard .rank-badge { font-size:10px; padding:2px 6px }

    /* Basculement vers la vue cartes */
    .task-desktop { display:none }
    .task-mobile  { display:block }

    /* Boutons dans les cartes */
    .dot-btn { width:30px; height:30px; font-size:12px; border-width:2px }
    .m-task-name { font-size:12px }
    .m-task-xp   { font-size:15px }
    .m-day-label { font-size:8px }
    .m-days-row  { gap:3px }
    .m-day-btns  { gap:3px }

    /* Section headers */
    .task-section-header h3 { font-size:16px }
    .cat-pill { font-size:10px; padding:2px 8px }
    .task-section { margin-bottom:18px }

    /* Manage */
    .manage-row { gap:6px; padding:9px 10px }
    .manage-row .task-name { font-size:13px }
    .manage-row select { font-size:11px; max-width:100px }
    .del-btn { width:32px; height:32px }
    .add-form { flex-direction:column; gap:8px }
    .add-form input, .add-form select { width:100%; min-width:unset; height:44px; font-size:15px }
    .add-form button { width:100%; height:44px; font-size:15px }

    /* Scores */
    #tab-scores { overflow-x:auto }
    .rank-table { font-size:11px; min-width:520px }
    .rank-table th, .rank-table td { padding:6px 6px }
    .rank-name { font-size:10px; padding:2px 6px }

    /* Settings */
    .theme-toggle { flex-direction:column; gap:8px }
    .theme-btn { padding:13px; font-size:14px; min-height:48px }
    .palette-row { gap:12px }
    .palette-btn { width:44px; height:44px }

    /* Catégories */
    .cat-manage-row { gap:6px 8px; padding:10px 12px }
    .cat-color-swatch { width:30px; height:30px }
    .cat-name-display  { font-size:13px }
    .cat-action-btn    { width:36px; height:36px; font-size:16px }

    /* Toast au-dessus de la nav */
    #xp-toast { bottom:80px !important }
  }

  @media(max-width:360px){
    .summary-grid { grid-template-columns:repeat(2,1fr) }
    .dot-btn { width:26px; height:26px; font-size:11px }
    .m-day-label { font-size:7px }
  }

  /* ══════════════════════════════════════════════════════
     SCORES & RANGS — refonte visuelle "flex" premium
     ══════════════════════════════════════════════════════ */

  /* ── Bannière profil pleine largeur ── */
  .sc-profile-hero {
    position:relative; overflow:hidden;
    background:var(--red); color:#fff;
    border-radius:20px; padding:32px 32px 28px;
    margin-bottom:12px;
    display:flex; align-items:center; gap:26px;
  }
  /* Cercles déco en fond */
  .sc-profile-hero::before {
    content:''; position:absolute;
    width:340px; height:340px; border-radius:50%;
    background:rgba(255,255,255,.06);
    top:-120px; right:-80px; pointer-events:none;
  }
  .sc-profile-hero::after {
    content:''; position:absolute;
    width:200px; height:200px; border-radius:50%;
    background:rgba(255,255,255,.04);
    bottom:-80px; right:80px; pointer-events:none;
  }
  /* Avatar XL avec ring multicouche */
  .sc-profile-avatar {
    width:110px; height:110px; border-radius:50%;
    border:3px solid rgba(255,255,255,.6); flex-shrink:0;
    background:rgba(0,0,0,.25);
    display:flex; align-items:center; justify-content:center;
    overflow:hidden;
    box-shadow:
      0 0 0 6px rgba(255,255,255,.12),
      0 0 0 10px rgba(255,255,255,.05),
      0 12px 40px rgba(0,0,0,.4);
    position:relative; z-index:1;
    transition:transform .2s;
  }
  .sc-profile-avatar:hover { transform:scale(1.04) }

  .sc-profile-info { flex:1; min-width:0; position:relative; z-index:1 }
  .sc-profile-label {
    font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:2px;
    opacity:.55; margin-bottom:6px;
  }
  /* Pseudo IMMENSE — effet "carte de joueur" */
  .sc-profile-pseudo {
    font-family:'Bebas Neue',sans-serif;
    font-size:clamp(40px, 6vw, 72px);
    letter-spacing:3px; line-height:.9; color:#fff;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    text-shadow:0 3px 20px rgba(0,0,0,.3);
    /* Léger biseautage pour l'effet "gravé" */
    -webkit-text-stroke:0.5px rgba(255,255,255,.2);
  }
  .sc-profile-subtitle {
    font-size:12px; opacity:.55; margin-top:8px; letter-spacing:.5px;
    display:flex; align-items:center; gap:6px;
  }
  .sc-profile-subtitle::before {
    content:''; width:18px; height:1px; background:rgba(255,255,255,.4);
  }
  .sc-profile-global-rank { text-align:right; flex-shrink:0; position:relative; z-index:1 }
  .sc-profile-rank-label {
    font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:1.2px;
    opacity:.55; margin-bottom:8px;
  }
  /* Badge rang global : grand, glassmorphism */
  .sc-profile-rank-badge {
    font-size:18px !important; padding:8px 22px !important;
    display:inline-block; border-radius:999px !important;
    background:rgba(255,255,255,.18) !important; color:#fff !important;
    backdrop-filter:blur(8px);
    border:1.5px solid rgba(255,255,255,.35);
    font-weight:800 !important; letter-spacing:.8px;
    box-shadow:0 4px 16px rgba(0,0,0,.2);
    text-transform:uppercase;
  }
  .sc-profile-rank-sub { font-size:10px; opacity:.5; margin-top:7px; letter-spacing:.3px }

  /* ── Hero XP semaine — compact semi-transparent ── */
  .sc-hero {
    background:var(--red);
    backdrop-filter:blur(8px);
    -webkit-backdrop-filter:blur(8px);
    color:#fff;
    border-radius:16px; padding:8px 18px 8px; margin-bottom:0;
    display:flex; align-items:center; gap:18px;
    border:1px solid rgba(255,255,255,.15);
  }
  .sc-hero-left { flex:1 }
  .sc-hero-label { font-size:10px; opacity:.7; text-transform:uppercase; letter-spacing:.6px; margin-bottom:1px }
  .sc-hero-xp { font-family:'Bebas Neue',sans-serif; font-size:30px; line-height:1; color:#fff }
  .sc-hero-max { font-size:14px; opacity:.6 }
  .sc-hero-badge {
    margin-top:3px; display:inline-block; font-size:11px; padding:2px 10px;
    border-radius:999px; background:rgba(255,255,255,.18); color:#fff; font-weight:600;
  }
  .sc-hero-right { margin-left:auto; text-align:right }
  .sc-hero-pct { font-family:'Bebas Neue',sans-serif; font-size:30px; color:#fff; line-height:1; opacity:.9 }
  .sc-hero-pct-label { font-size:10px; opacity:.65 }

  /* Barre XP fine — couleur accent */
  .sc-prog-wrap {
    height:4px; background:rgba(255,255,255,.15);
    border-radius:999px; overflow:hidden;
    margin:8px 0 0;
  }
  .sc-prog-bar {
    height:100%; border-radius:999px;
    transition:width .5s cubic-bezier(.4,0,.2,1);
    background:rgba(255,255,255,.7);
  }

  /* ── Ladder des rangs ── */
  .sc-ladder {
    display:flex; gap:4px; margin-bottom:20px;
    background:var(--bg2); border:0.5px solid var(--border);
    border-radius:20px; padding:14px 16px;
    overflow-x:auto; scrollbar-width:none;
  }
  .sc-ladder::-webkit-scrollbar { display:none }
  .sc-ladder-step {
    flex:1; min-width:72px; display:flex; flex-direction:column;
    align-items:center; gap:5px; padding:8px 4px; border-radius:14px;
    border:1.5px solid transparent; transition:all .2s; opacity:.4;
  }
  .sc-ladder-step.done  { opacity:.6 }
  .sc-ladder-step.active {
    opacity:1; background:var(--bg3);
    border-color:var(--border2); box-shadow:0 0 0 1px var(--border2);
  }
  .sc-ladder-range { font-size:10px; color:var(--text3); text-align:center; white-space:nowrap }

  /* ── Titre section jauges ── */
  .sc-gauges-title {
    font-family:'Bebas Neue',sans-serif; font-size:22px; letter-spacing:1.5px;
    color:var(--text2); margin:20px 0 12px;
    display:flex; align-items:center; gap:10px;
  }
  .sc-gauges-title::after {
    content:''; flex:1; height:1px; background:var(--border);
  }

  /* ── Grille des cartes jauges ── */
  .sc-gauges {
    display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
    gap:12px; margin-bottom:12px;
  }
  .sc-gauge-card {
    background:var(--bg2); border:0.5px solid var(--border);
    border-radius:18px; padding:18px 20px; display:flex; flex-direction:column;
    transition:border-color .2s, transform .15s, box-shadow .2s;
    position:relative; overflow:hidden;
  }
  .sc-gauge-card::before {
    content:''; position:absolute; top:0; left:0; right:0; height:3px;
    background:var(--cat-accent,var(--red)); border-radius:18px 18px 0 0;
    opacity:.7;
  }
  .sc-gauge-card:hover {
    border-color:var(--border2);
    transform:translateY(-2px);
    box-shadow:0 8px 28px rgba(0,0,0,.22);
  }
  .sc-gauge-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px }
  .sc-gauge-dot { width:12px; height:12px; border-radius:50%; display:inline-block; flex-shrink:0 }
  .sc-gauge-name { font-size:16px; font-weight:700; letter-spacing:.2px }
  .sc-gauge-avg-rank { font-size:11px; color:var(--text3); display:flex; align-items:center; gap:4px }
  .sc-gauge-xp-row { display:flex; align-items:baseline; gap:6px; margin-bottom:10px }
  .sc-gauge-xp { font-family:'Bebas Neue',sans-serif; font-size:36px; line-height:1 }
  .sc-gauge-max { font-size:13px; color:var(--text3); flex:1 }
  .sc-gauge-pct { font-size:14px; color:var(--text2); font-weight:700 }

  /* Barre principale large et arrondie */
  .sc-gauge-bar-wrap {
    position:relative; height:24px; border-radius:12px;
    background:var(--bg3); overflow:hidden; margin-bottom:6px;
    border:1px solid var(--border);
  }
  .sc-gauge-track { position:absolute; inset:0; display:flex; pointer-events:none }
  .sc-gauge-seg { height:100%; display:flex; align-items:stretch; position:relative }
  .sc-gauge-seg-fill { height:100%; transition:width .65s cubic-bezier(.4,0,.2,1); min-width:0 }
  .sc-gauge-tick {
    position:absolute; right:0; top:10%; bottom:10%;
    width:1.5px; background:var(--bg2); opacity:.6; z-index:2;
  }
  .sc-gauge-fill-overlay {
    position:absolute; top:0; left:0; height:100%;
    border-radius:12px; transition:width .65s cubic-bezier(.4,0,.2,1);
    pointer-events:none;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.18), 0 0 12px rgba(0,0,0,.12);
  }
  /* Reflet glossy sur la barre */
  .sc-gauge-bar-wrap::after {
    content:''; position:absolute; top:0; left:0; right:0; height:40%;
    background:linear-gradient(180deg,rgba(255,255,255,.08) 0%,transparent 100%);
    border-radius:12px 12px 0 0; pointer-events:none; z-index:5;
  }

  .sc-gauge-rank-labels { display:flex; justify-content:space-between; margin-bottom:10px }
  .sc-gauge-rank-lbl { font-size:9px; color:var(--text3); letter-spacing:.2px; transition:opacity .3s }

  /* Pip steps */
  .sc-rank-steps {
    display:flex; align-items:center; margin-bottom:10px;
    position:relative; padding:4px 0;
  }
  .sc-rank-steps::before {
    content:''; position:absolute; top:50%; left:8px; right:8px;
    height:2px; background:var(--border2); transform:translateY(-50%); z-index:0;
  }
  .sc-rank-pip {
    flex:1; height:14px; width:14px; max-width:14px; border-radius:50%; flex-shrink:0;
    background:var(--bg3); border:2px solid var(--border2);
    position:relative; z-index:1; cursor:default; transition:transform .15s;
  }
  .sc-rank-pip.done { opacity:.55 }
  .sc-rank-pip.cur  { transform:scale(1.4); box-shadow:0 0 0 3px var(--bg2) }
  .sc-pip-tooltip {
    display:none; position:absolute; bottom:calc(100% + 8px); left:50%;
    transform:translateX(-50%);
    background:var(--bg3); border:1px solid var(--border2);
    color:var(--text); font-size:11px; padding:4px 8px; border-radius:8px;
    white-space:nowrap; z-index:10; text-align:center; line-height:1.5;
    pointer-events:none;
  }
  .sc-rank-pip:hover .sc-pip-tooltip { display:block }
  .sc-card-next { font-size:12px; color:var(--text2); display:flex; align-items:center; gap:6px; flex-wrap:wrap; margin-top:2px }

  /* sc-card kept for legacy (not used in new layout but keeps JS safe) */
  .sc-cards { display:none }
  .sc-card  { display:none }

  @media(max-width:640px){
    .sc-profile-hero { padding:18px 16px 16px; gap:14px; border-radius:16px }
    .sc-profile-avatar { width:72px; height:72px }
    .sc-profile-pseudo { font-size:clamp(28px,8vw,40px) }
    .sc-profile-global-rank { text-align:left }
    .sc-hero { padding:14px 16px 12px; border-radius:14px }
    .sc-hero-xp { font-size:38px }
    .sc-hero-pct { font-size:34px }
    .sc-prog-wrap { margin:8px 0 0 }
    .sc-ladder { gap:3px; padding:10px 10px; margin-bottom:14px; border-radius:14px }
    .sc-ladder-step { min-width:54px; padding:6px 2px; border-radius:10px }
    .sc-ladder-range { font-size:9px }
    .sc-gauges { grid-template-columns:1fr; gap:10px }
    .sc-gauge-card { padding:14px 16px; border-radius:16px }
    .sc-gauge-xp { font-size:28px }
    .sc-gauge-bar-wrap { height:18px; border-radius:10px }
    .sc-gauge-fill-overlay { border-radius:10px }
  }

  /* ── AUTH OVERLAY ── */
  #auth-overlay {
    position:fixed;inset:0;background:var(--bg);z-index:1000;
    display:flex;align-items:center;justify-content:center;
    font-family:'DM Sans',sans-serif;
  }
  .auth-box {
    background:var(--bg2);border:1px solid var(--border2);border-radius:16px;
    padding:36px 32px;width:100%;max-width:380px;margin:16px;
    display:flex;flex-direction:column;gap:16px;
  }
  .auth-logo { font-family:'Bebas Neue',sans-serif;font-size:32px;color:var(--red);letter-spacing:2px;text-align:center }
  .auth-subtitle { text-align:center;color:var(--text2);font-size:13px;margin-top:-8px }
  .auth-tabs { display:flex;gap:0;border:1px solid var(--border2);border-radius:8px;overflow:hidden }

</style>

<script>
// ── CONFIG ────────────────────────────────────────────────
let CATS = {
  Physique:   {color:'#4CAF50', bg:'#1b2e1b', textCol:'#81C784'},
  Spirituel:  {color:'#7986CB', bg:'#1a1c2e', textCol:'#9FA8DA'},
  Discipline: {color:'#FF7043', bg:'#2e1a14', textCol:'#FF8A65'},
  Travail:    {color:'#26C6DA', bg:'#0e2a2e', textCol:'#4DD0E1'},
  Mental:     {color:'#EF5350', bg:'#2e1212', textCol:'#EF9A9A'}
};
const MIN_CATS = 5;

// Derive bg/textCol from a hex color
function deriveCatTheme(hex) {
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  const darken=(c,f)=>Math.round(c*f);
  const bgR=darken(r,0.15)+Math.round((1-0.15)*17);
  const bgG=darken(g,0.15)+Math.round((1-0.15)*17);
  const bgB=darken(b,0.15)+Math.round((1-0.15)*17);
  const clamp=v=>Math.max(0,Math.min(255,v));
  const toHex=v=>clamp(v).toString(16).padStart(2,'0');
  const lightR=clamp(r+80),lightG=clamp(g+80),lightB=clamp(b+80);
  return {
    color: hex,
    bg: `#${toHex(bgR)}${toHex(bgG)}${toHex(bgB)}`,
    textCol: `#${toHex(lightR)}${toHex(lightG)}${toHex(lightB)}`
  };
}
const RANKS = [
  {name:'Hors Jeu', cls:'r-hors'},
  {name:'Bronze',   cls:'r-bronze'},
  {name:'Argent',   cls:'r-argent'},
  {name:'Or',       cls:'r-or'},
  {name:'Platine',  cls:'r-platine'},
  {name:'Diamant',  cls:'r-diamant'},
  {name:'Immortal', cls:'r-immortal'}
];
const RANK_PCTS = [[0,0],[0.001,0.2],[0.2,0.4],[0.4,0.6],[0.6,0.8],[0.8,0.92],[0.92,1.001]];
const DAYS = ['Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi','Dimanche'];
const STORAGE_KEY = 'xp-tracker-v1';

// ── STATE ─────────────────────────────────────────────────
let tasks = [
  {id:1,name:'Musculation',cat:'Physique'},{id:2,name:'Créatine, complément',cat:'Physique'},
  {id:3,name:'Minoxidil (matin et soir)',cat:'Physique'},{id:4,name:'Luc Léger Training',cat:'Physique'},
  {id:5,name:'Manger ses apports journaliers',cat:'Physique'},{id:6,name:"2L d'eau",cat:'Physique'},
  {id:7,name:'No junk Food',cat:'Physique'},
  {id:8,name:'Temps de prière',cat:'Spirituel'},{id:9,name:'Gratitude (3 choses)',cat:'Spirituel'},
  {id:10,name:"Pas d'insulte",cat:'Spirituel'},{id:11,name:'Cultivé sa Foi',cat:'Spirituel'},
  {id:12,name:'Se lever tôt (8h)',cat:'Discipline'},{id:13,name:'No Porn',cat:'Discipline'},
  {id:14,name:'No Juice solo',cat:'Discipline'},{id:15,name:'Ranger sa chambre',cat:'Discipline'},
  {id:16,name:'Pas de procrastination volontaire',cat:'Discipline'},
  {id:17,name:'Se brosser les dents',cat:'Discipline'},{id:18,name:'Se laver',cat:'Discipline'},
  {id:19,name:'1h min travaux UGC',cat:'Travail'},{id:20,name:'Publier du contenu',cat:'Travail'},
  {id:21,name:"30min min d'un Livre utile",cat:'Mental'},
  {id:22,name:'Apprendre deux nouveaux mots',cat:'Mental'},
  {id:23,name:'Regarder du contenu éducatif',cat:'Mental'}
];
let scores = {};
let nextId = 24;
let currentWeek = getWeekKey(new Date());
let userNavigatedWeek = false; // true quand l'utilisateur navigue manuellement

// ── PERSISTENCE ───────────────────────────────────────────
let cloudSaveTimer = null;
let currentUser = null;
let userProfile = {};

function save() {
  setSaveStatus('saving');
  // Sauvegarde locale immédiate (synchrone) — un rechargement rapide ne perd plus rien
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify({tasks, scores, nextId, cats: CATS})); } catch(e){}
  clearTimeout(cloudSaveTimer);
  cloudSaveTimer = setTimeout(async () => {
    // Save to Firestore if logged in
    if (currentUser) {
      try {
        // Use update() so deleted categories/tasks are fully overwritten
        // (merge:true would resurrect deleted keys from old Firestore data).
        await firestore.collection('users').doc(currentUser.uid).update({
          tasks, scores, nextId, cats: CATS,
          updatedAt: new Date().toISOString()
        });
        setSaveStatus('saved');
      } catch(e) { setSaveStatus('error'); }
    } else {
      setSaveStatus('saved');
    }
  }, 800);
}

async function loadFromCloud(uid) {
  try {
    const doc = await firestore.collection('users').doc(uid).get();
    if (doc.exists) {
      const d = doc.data();
      if (d.tasks)  tasks  = d.tasks;
      if (d.scores) scores = d.scores;
      if (d.nextId) nextId = d.nextId;
      if (d.cats)   CATS   = d.cats;
    }
  } catch(e) {
    // Fallback to localStorage
    loadSavedLocal();
  }
}

function loadSavedLocal() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const d = JSON.parse(raw);
    if (d.tasks)  tasks  = d.tasks;
    if (d.scores) scores = d.scores;
    if (d.nextId) nextId = d.nextId;
    if (d.cats)   CATS   = d.cats;
  } catch(e) {}
}

function setSaveStatus(state) {
  const dot = document.getElementById('save-dot');
  const lbl = document.getElementById('save-label');
  if (!dot || !lbl) return;
  dot.className = 'save-dot';
  if (state === 'saved')  { dot.classList.add('saved');  lbl.textContent = currentUser ? '☁ Synchronisé' : 'Sauvegardé'; }
  if (state === 'saving') { dot.classList.add('saving'); lbl.textContent = 'Sauvegarde…'; }
  if (state === 'error')  { lbl.textContent = 'Erreur sauvegarde'; }
}

// ── AUTH UI ───────────────────────────────────────────────
let authMode = 'login';

function switchAuthTab(mode) {
  authMode = mode;
  document.querySelectorAll('.auth-tab').forEach((t,i) => t.classList.toggle('active', (i===0&&mode==='login')||(i===1&&mode==='register')));
  const pseudo = document.getElementById('auth-pseudo');
  const btn = document.getElementById('auth-submit-btn');
  const pw = document.getElementById('auth-password');
  if (pseudo) pseudo.style.display = mode === 'register' ? 'block' : 'none';
  if (btn) btn.textContent = mode === 'register' ? "S'inscrire" : 'Se connecter';
  if (pw) pw.placeholder = mode === 'register' ? 'Mot de passe (6 caractères min)' : 'Mot de passe';
  setAuthError('');
}

function setAuthError(msg) {
  const el = document.getElementById('auth-error');
  if (el) el.textContent = msg;
}

async function signInGoogle() {
  setAuthError('');
  try {
    const provider = new firebase.auth.GoogleAuthProvider();
    await firebase.auth().signInWithPopup(provider);
  } catch(e) {
    setAuthError(e.message || 'Erreur Google');
  }
}

async function authSubmit() {
  const email = document.getElementById('auth-email')?.value.trim();
  const password = document.getElementById('auth-password')?.value;
  const pseudo = document.getElementById('auth-pseudo')?.value.trim();
  setAuthError('');
  if (!email || !password) { setAuthError('Remplis tous les champs.'); return; }
  try {
    if (authMode === 'register') {
      const cred = await firebase.auth().createUserWithEmailAndPassword(email, password);
      if (pseudo) {
        await cred.user.updateProfile({ displayName: pseudo });
        await firestore.collection('users').doc(cred.user.uid).set({ pseudo }, { merge: true });
      }
    } else {
      await firebase.auth().signInWithEmailAndPassword(email, password);
    }
  } catch(e) {
    const msgs = {
      'auth/email-already-in-use': 'Email déjà utilisé.',
      'auth/invalid-email': 'Email invalide.',
      'auth/wrong-password': 'Mot de passe incorrect.',
      'auth/user-not-found': 'Aucun compte avec cet email.',
      'auth/weak-password': 'Mot de passe trop court (6 min).',
    };
    setAuthError(msgs[e.code] || e.message);
  }
}

async function signOut() {
  await firebase.auth().signOut();
}

// ── PROFILE TAB ───────────────────────────────────────────
async function renderProfile() {
  if (!currentUser) return;
  const pseudo = userProfile.pseudo || currentUser.displayName || '';
  const email = currentUser.email || '';
  const providers = currentUser.providerData.map(p => {
    if (p.providerId === 'google.com') return '🔵 Google';
    if (p.providerId === 'password') return '✉️ Email / Mot de passe';
    return p.providerId;
  }).join(', ');

  // Priority: custom uploaded photo > Google photo > initials
  const photoSrc = userProfile.photoBase64 || currentUser.photoURL || '';
  const avatarContent = photoSrc
    ? `<img src="${photoSrc}" alt="avatar" style="width:100%;height:100%;object-fit:cover;border-radius:50%"/>`
    : `<span style="font-size:36px;line-height:1">${(pseudo||email||'?')[0].toUpperCase()}</span>`;

  document.getElementById('tab-profile').innerHTML = `
    <h2 style="font-size:22px;margin-bottom:16px">Mon Profil</h2>

    <div class="profile-avatar-wrap">
      <div class="profile-avatar" id="profile-avatar-btn" onclick="document.getElementById('avatar-file').click()" title="Changer la photo">
        ${avatarContent}
      </div>
      <input type="file" id="avatar-file" accept="image/*" style="display:none" onchange="uploadAvatar(this)"/>
      <div style="text-align:center">
        <div class="profile-name">${pseudo || 'Sans pseudo'}</div>
        <div class="profile-email">${email}</div>
      </div>
      <span class="sync-badge">☁ Synchronisation active</span>
    </div>

    <div class="profile-section">
      <h4>Pseudonyme</h4>
      <div class="profile-edit-row">
        <input id="pseudo-input" type="text" placeholder="Ton pseudo…" value="${pseudo}"/>
        <button onclick="savePseudo()">Enregistrer</button>
      </div>
    </div>

    <div class="profile-section">
      <h4>Informations du compte</h4>
      <div class="profile-row">
        <label>Email</label>
        <span>${email || '—'}</span>
      </div>
      <div class="profile-row">
        <label>Connexion via</label>
        <span class="profile-provider-badge">${providers}</span>
      </div>
      <div class="profile-row">
        <label>UID</label>
        <span style="font-size:10px;color:var(--text3);word-break:break-all">${currentUser.uid.slice(0,16)}…</span>
      </div>
    </div>

    <div class="profile-section">
      <h4>Données</h4>
      <div class="profile-row">
        <label>Tâches enregistrées</label>
        <span>${tasks.length}</span>
      </div>
      <div class="profile-row">
        <label>Semaines trackées</label>
        <span>${Object.keys(scores).length}</span>
      </div>
      <div class="profile-row">
        <label>Catégories</label>
        <span>${Object.keys(CATS).length}</span>
      </div>
    </div>

    <button class="profile-signout" onclick="signOut()">Se déconnecter</button>
  `;
}

async function savePseudo() {
  const val = document.getElementById('pseudo-input')?.value.trim();
  if (!val) return;
  userProfile.pseudo = val;
  try {
    await currentUser.updateProfile({ displayName: val });
    await firestore.collection('users').doc(currentUser.uid).set({ pseudo: val }, { merge: true });
    showToast('Pseudo mis à jour !');
    renderThemeSettings();
    renderTracker(); // refresh welcome message
  } catch(e) { showToast('Erreur : ' + e.message); }
}

async function uploadAvatar(input) {
  const file = input.files[0];
  if (!file) return;
  if (file.size > 5 * 1024 * 1024) { showToast('Image trop lourde (max 5 Mo)'); return; }

  showToast('Traitement…');

  // Resize to max 200x200 before storing (Firestore 1MB field limit)
  const reader = new FileReader();
  reader.onload = (e) => {
    const img = new Image();
    img.onload = async () => {
      const MAX = 200;
      const scale = Math.min(MAX / img.width, MAX / img.height, 1);
      const w = Math.round(img.width * scale);
      const h = Math.round(img.height * scale);
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      const base64 = canvas.toDataURL('image/jpeg', 0.85);
      try {
        await firestore.collection('users').doc(currentUser.uid).set({ photoBase64: base64 }, { merge: true });
        userProfile.photoBase64 = base64;
        showToast('Photo mise à jour !');
        renderThemeSettings();
      } catch(err) {
        console.error(err);
        showToast('Erreur : ' + (err.message || 'impossible de sauvegarder'));
      }
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

// ── DATES ─────────────────────────────────────────────────
// Parser "YYYY-MM-DD" en date LOCALE (new Date("YYYY-MM-DD") parse en UTC → décalage)
function parseLocal(k){const[y,m,d]=k.split('-').map(Number);return new Date(y,m-1,d)}
function toKey(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function getWeekKey(d){
  const t=new Date(d);t.setHours(0,0,0,0);
  t.setDate(t.getDate()-((t.getDay()+6)%7));
  return toKey(t);
}
function weekLabel(k){
  const d=parseLocal(k),e=new Date(d);e.setDate(e.getDate()+6);
  return d.toLocaleDateString('fr-FR',{day:'numeric',month:'short'})+' – '+
         e.toLocaleDateString('fr-FR',{day:'numeric',month:'short',year:'numeric'});
}
function prevWeek(k){const d=parseLocal(k);d.setDate(d.getDate()-7);return toKey(d)}
function nextWeek(k){const d=parseLocal(k);d.setDate(d.getDate()+7);return toKey(d)}

// ── XP / RANK ─────────────────────────────────────────────
function getScore(wk,id,day){return (scores[wk]||{})[id+'-'+day]||0}
function setScore(wk,id,day,val){if(!scores[wk])scores[wk]={};scores[wk][id+'-'+day]=val}
function catXP(wk,cat){return tasks.filter(t=>t.cat===cat).reduce((s,t)=>s+DAYS.reduce((a,d)=>a+getScore(wk,t.id,d),0),0)}
function catMax(cat){return tasks.filter(t=>t.cat===cat).length*7}
function totalXP(wk){return Object.keys(CATS).reduce((s,c)=>s+catXP(wk,c),0)}
function totalMax(){return Object.keys(CATS).reduce((s,c)=>s+catMax(c),0)}
function getRank(xp,max){
  if(!max)return 0;
  const p=xp/max;
  for(let i=RANK_PCTS.length-1;i>=0;i--)if(p>=RANK_PCTS[i][0])return i;
  return 0;
}
function getRankThresholds(max){return RANK_PCTS.map(([lo,hi])=>[Math.ceil(lo*max),Math.floor(hi*max)])}

// ── CAT PILL COLORS (theme-aware) ────────────────────────
function catPillStyle(cat) {
  const isLight = document.body.classList.contains('mode-light');
  if (!isLight) {
    return `background:${CATS[cat].bg};color:${CATS[cat].textCol}`;
  }
  const key = cat.toLowerCase();
  const bg  = getComputedStyle(document.body).getPropertyValue(`--cat-${key}-bg`).trim();
  const col = getComputedStyle(document.body).getPropertyValue(`--cat-${key}-text`).trim();
  // Fallback for custom categories without CSS vars
  if (!bg) {
    const c = CATS[cat];
    return `background:${c.bg};color:${c.textCol}`;
  }
  return `background:${bg};color:${col}`;
}
function renderTracker() {
  const wk=currentWeek;
  const tXP=totalXP(wk), tMax=totalMax();
  const tRank=RANKS[getRank(tXP,tMax)];
  const tPct=tMax?Math.round(tXP/tMax*100):0;
  const pseudo = currentUser ? (userProfile.pseudo || currentUser.displayName || currentUser.email.split('@')[0]) : '';
  const welcome = pseudo ? `<div style="font-size:13px;color:var(--text2);margin-bottom:10px">Salut, <span style="color:var(--red);font-weight:600">${pseudo}</span> ! 👋</div>` : '';

  // ── Détection du jour courant dans la semaine affichée ──
  const todayKey = getWeekKey(new Date());
  const isCurrentWeek = (wk === todayKey);
  // getDay() : 0=dim, 1=lun … 6=sam → on mappe sur DAYS (0=Lun … 6=Dim)
  const todayJsDay = new Date().getDay(); // 0=dim
  const todayDayIdx = isCurrentWeek ? ((todayJsDay + 6) % 7) : -1; // -1 si autre semaine

  let h = `${welcome}
  <div class="week-nav">
    <button onclick="changeWeek(-1)">&#8592; Préc.</button>
    <span class="week-label">${weekLabel(wk)}</span>
    <button onclick="changeWeek(1)">Suiv. &#8594;</button>
  </div>
  <div class="hero">
    <div>
      <div class="label">XP Total</div>
      <div class="hero-xp">${tXP.toFixed(1)}</div>
      <span class="hero-badge ${tRank.cls}">${tRank.name}</span>
    </div>
    <div class="hero-right">
      <div class="label">sur ${tMax} XP max</div>
      <div class="hero-pct">${tPct}% accompli</div>
    </div>
  </div>
  `;

  const catKeys = Object.keys(CATS);
  const firstCats = catKeys.slice(0, 5);
  const extraCats = catKeys.slice(5);

  // First 5 categories: normal grid
  h += '<div class="summary-grid">';
  firstCats.forEach(cat => {
    const xp=catXP(wk,cat), max=catMax(cat);
    const rank=RANKS[getRank(xp,max)];
    const pct=max?Math.round(xp/max*100):0;
    const c=CATS[cat];
    h+=`<div class="scard">
      <div class="cat-label"><span class="cat-dot" style="background:${c.color}"></span>${cat}</div>
      <div class="xp-val" style="color:${c.color}">${xp.toFixed(1)}</div>
      <div class="xp-max">/ ${max} XP</div>
      <div class="prog-wrap"><div class="prog-bar" style="width:${pct}%;background:${c.color}"></div></div>
      <span class="rank-badge ${rank.cls}">${rank.name}</span>
    </div>`;
  });
  h += '</div>';

  // Extra categories: horizontal scroll strip
  if (extraCats.length > 0) {
    h += '<div class="summary-scroll-wrap"><div class="summary-scroll">';
    extraCats.forEach(cat => {
      const xp=catXP(wk,cat), max=catMax(cat);
      const rank=RANKS[getRank(xp,max)];
      const pct=max?Math.round(xp/max*100):0;
      const c=CATS[cat];
      h+=`<div class="scard scard-scroll">
        <div class="cat-label"><span class="cat-dot" style="background:${c.color}"></span>${cat}</div>
        <div class="xp-val" style="color:${c.color}">${xp.toFixed(1)}</div>
        <div class="xp-max">/ ${max} XP</div>
        <div class="prog-wrap"><div class="prog-bar" style="width:${pct}%;background:${c.color}"></div></div>
        <span class="rank-badge ${rank.cls}">${rank.name}</span>
      </div>`;
    });
    h += '</div></div>';
  }

  Object.keys(CATS).forEach(cat => {
    const catTasks=tasks.filter(t=>t.cat===cat);
    if(!catTasks.length)return;
    const c=CATS[cat];
    h+=`<div class="task-section">
      <div class="task-section-header">
        <h3 style="color:${c.color}">${cat}</h3>
        <span class="cat-pill" style="${catPillStyle(cat)}">${catTasks.length} tâches · ${catXP(wk,cat).toFixed(1)} / ${catMax(cat)} XP</span>
      </div>`;

    /* ── VERSION DESKTOP : tableau horizontal ── */
    h+=`<div class="task-table-wrap task-desktop"><table class="task-grid">
        <colgroup>
          <col class="col-name"/>
          ${DAYS.map(()=>'<col class="col-day"/>').join('')}
          <col class="col-xp"/>
        </colgroup>
        <thead><tr>
          <th></th>
          ${DAYS.map((d,i)=>`<th style="${i===todayDayIdx?'color:var(--text);font-weight:700;font-size:10px':''}">${d.slice(0,3)}${i===todayDayIdx?'<br><span style="display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--red);margin-top:1px"></span>':''}</th>`).join('')}
          <th>XP</th>
        </tr></thead>
        <tbody>`;
    catTasks.forEach(t => {
      h+=`<tr><td style="color:${c.color}">${t.name}</td>`;
      DAYS.forEach(day => {
        const sc=getScore(wk,t.id,day);
        h+=`<td class="day-cell"><div class="day-btns">`;
        [[0,'red','✕'],[0.5,'ora','½'],[1,'grn','✓']].forEach(([v,cls,lbl])=>{
          h+=`<button class="dot-btn ${cls}${sc===v?' active':''}" onclick="toggleScore('${wk}',${t.id},'${day}',${v})">${lbl}</button>`;
        });
        h+=`</div></td>`;
      });
      const rowXP=DAYS.reduce((s,d)=>s+getScore(wk,t.id,d),0);
      h+=`<td style="color:${c.color}">${rowXP.toFixed(1)} XP</td></tr>`;
    });
    h+=`</tbody></table></div>`;

    /* ── VERSION MOBILE : cartes par tâche ── */
    h+=`<div class="task-mobile">`;
    catTasks.forEach(t => {
      const rowXP=DAYS.reduce((s,d)=>s+getScore(wk,t.id,d),0);
      h+=`<div class="m-task-card">
        <div class="m-task-header">
          <span class="m-task-name" style="color:${c.color}">${t.name}</span>
          <span class="m-task-xp" style="color:${c.color}">${rowXP.toFixed(1)} XP</span>
        </div>
        <div class="m-days-row">`;
      DAYS.forEach((day,di) => {
        const sc=getScore(wk,t.id,day);
        const isToday = di === todayDayIdx;
        h+=`<div class="m-day-col">
          <div class="m-day-label" style="${isToday?'color:var(--text);font-weight:700;font-size:10px':''}">${day.slice(0,2)}${isToday?'<span style="display:inline-block;width:4px;height:4px;border-radius:50%;background:var(--red);margin-left:1px;vertical-align:middle"></span>':''}</div>
          <div class="m-day-btns">`;
        [[0,'red','✕'],[0.5,'ora','½'],[1,'grn','✓']].forEach(([v,cls,lbl])=>{
          h+=`<button class="dot-btn ${cls}${sc===v?' active':''}" onclick="toggleScore('${wk}',${t.id},'${day}',${v})">${lbl}</button>`;
        });
        h+=`</div></div>`;
      });
      h+=`</div></div>`;
    });
    h+=`</div>`;

    h+=`</div>`; // end task-section
  });

  document.getElementById('tab-tracker').innerHTML = h;
}

// ── RENDER SCORES ─────────────────────────────────────────
function renderScores() {
  const wk = currentWeek;
  const tXP = totalXP(wk), tMax = totalMax();
  const tRidx = getRank(tXP, tMax);
  const tRank = RANKS[tRidx];
  const tPct = tMax ? Math.round(tXP / tMax * 100) : 0;

  // ── Données profil ──
  const pseudo = currentUser ? (userProfile.pseudo || currentUser.displayName || currentUser.email?.split('@')[0] || 'Joueur') : 'Joueur';
  const photoSrc = userProfile.photoBase64 || (currentUser ? currentUser.photoURL : '') || '';
  const avatarContent = photoSrc
    ? `<img src="${photoSrc}" alt="avatar" style="width:100%;height:100%;object-fit:cover;border-radius:50%"/>`
    : `<span style="font-size:42px;line-height:1">${(pseudo||'?')[0].toUpperCase()}</span>`;

  // ── Calcul rang global (moyenne toutes semaines) ──
  const allWeeks = Object.keys(scores);
  let globalRankIdx = tRidx;
  let globalRankLabel = '';
  if (allWeeks.length > 1) {
    const avgPct = allWeeks.reduce((sum, w) => {
      const mx = totalMax();
      return sum + (mx ? totalXP(w) / mx : 0);
    }, 0) / allWeeks.length;
    globalRankIdx = getRank(avgPct * totalMax(), totalMax());
    globalRankLabel = RANKS[globalRankIdx].name;
  } else {
    globalRankLabel = tRank.name;
    globalRankIdx = tRidx;
  }

  // ── Rang moyen par catégorie (toutes semaines) ──
  const catAvgRanks = {};
  Object.keys(CATS).forEach(cat => {
    const mx = catMax(cat);
    if (!mx || allWeeks.length === 0) { catAvgRanks[cat] = 0; return; }
    const avg = allWeeks.reduce((s,w)=>s+catXP(w,cat),0) / allWeeks.length;
    catAvgRanks[cat] = getRank(avg, mx);
  });
  const catRankSum = Object.values(catAvgRanks).reduce((a,b)=>a+b,0);
  const catRankAvg = Object.keys(CATS).length ? Math.round(catRankSum / Object.keys(CATS).length) : 0;
  const globalRankFromCats = Math.min(catRankAvg, RANKS.length - 1);

  // ── Hero profile ──
  let h = `
  <div class="sc-profile-hero">
    <div class="sc-profile-avatar">${avatarContent}</div>
    <div class="sc-profile-info">
      <div class="sc-profile-label">LEVELIS · Tableau de bord</div>
      <div class="sc-profile-pseudo">${pseudo}</div>
      <div class="sc-profile-subtitle">${allWeeks.length} semaine${allWeeks.length>1?'s':''} trackée${allWeeks.length>1?'s':''}</div>
    </div>
    <div class="sc-profile-global-rank">
      <div class="sc-profile-rank-label">Rang global</div>
      <span class="sc-profile-rank-badge">${RANKS[globalRankFromCats].name}</span>
      <div class="sc-profile-rank-sub">moy. toutes catégories</div>
    </div>
  </div>`;

  // ── Hero XP semaine courante ──
  h += `
  <div class="sc-hero">
    <div style="width:100%">
      <div style="display:flex;align-items:center;gap:18px;margin-bottom:8px">
        <div class="sc-hero-left">
          <div class="sc-hero-label">XP Total cette semaine</div>
          <div class="sc-hero-xp">${tXP.toFixed(1)} <span class="sc-hero-max">/ ${tMax} XP</span></div>
          <span class="hero-badge ${tRank.cls}" style="background:rgba(255,255,255,.2);color:#fff;margin-top:3px;display:inline-block;border-radius:999px;font-size:11px;padding:2px 10px;font-weight:600">${tRank.name}</span>
        </div>
        <div class="sc-hero-right" style="margin-left:auto;text-align:right">
          <div class="sc-hero-pct">${tPct}%</div>
          <div class="sc-hero-pct-label">accompli</div>
        </div>
      </div>
      <div class="sc-prog-wrap"><div class="sc-prog-bar" style="width:${tPct}%"></div></div>
    </div>
  </div>`;

  // ── Rank ladder ──
  const tThresh = getRankThresholds(tMax);
  h += `<div class="sc-ladder">`;
  RANKS.forEach((r, i) => {
    const active = i === tRidx;
    const done = i < tRidx;
    const [lo, hi] = tThresh[i];
    h += `<div class="sc-ladder-step ${active ? 'active' : ''} ${done ? 'done' : ''}">
      <span class="rank-badge ${r.cls}" style="font-size:10px;padding:2px 7px">${r.name}</span>
      <div class="sc-ladder-range">${i === 0 ? '0' : `${lo}–${hi}`}</div>
    </div>`;
  });
  h += `</div>`;

  // ── Per-category GAUGES ──
  h += `<div class="sc-gauges-title">Progression par catégorie</div>`;
  h += `<div class="sc-gauges">`;
  Object.keys(CATS).forEach(cat => {
    const xp = catXP(wk, cat), max = catMax(cat);
    const ridx = getRank(xp, max);
    const rank = RANKS[ridx];
    const pct = max ? Math.round(xp / max * 100) : 0;
    const thresh = getRankThresholds(max);
    const c = CATS[cat];
    const nextIdx = Math.min(ridx + 1, RANKS.length - 1);
    const nextRank = RANKS[nextIdx];
    const nextXP = ridx < RANKS.length - 1 ? thresh[nextIdx][0] : max;
    const toNext = Math.max(0, nextXP - xp);
    // Rang de la semaine précédente
    const prevWk = prevWeek(wk);
    const prevXP = catXP(prevWk, cat);
    const prevRidx = getRank(prevXP, max);
    const prevRank = RANKS[prevRidx];
    const hasPrevData = (scores[prevWk] !== undefined);

    // Segments de rangs pour la jauge multi-segment
    const rankSegments = RANK_PCTS.map(([lo,hi],i) => {
      const loXP = lo * max, hiXP = hi * max;
      const segFill = Math.min(Math.max(xp - loXP, 0), hiXP - loXP);
      const segPct = (hiXP - loXP) > 0 ? (segFill / (hiXP - loXP)) * 100 : 0;
      const segWidth = ((hi - lo) * 100);
      return {rank: RANKS[i], segPct, segWidth, lo, hi, loXP, hiXP};
    });

    h += `<div class="sc-gauge-card" style="--cat-accent:${c.color}">
      <div class="sc-gauge-header">
        <div style="display:flex;align-items:center;gap:8px">
          <span class="sc-gauge-dot" style="background:${c.color};box-shadow:0 0 8px ${c.color}66"></span>
          <span class="sc-gauge-name" style="color:${c.color}">${cat}</span>
        </div>
        <div style="display:flex;align-items:center;gap:6px">
          ${hasPrevData ? `<span class="sc-gauge-avg-rank" title="Rang semaine précédente">S-1 <span class="rank-badge ${prevRank.cls}" style="font-size:10px;padding:1px 6px">${prevRank.name}</span></span>` : ''}
          <span class="rank-badge ${rank.cls}">${rank.name}</span>
        </div>
      </div>

      <div class="sc-gauge-xp-row">
        <span class="sc-gauge-xp" style="color:${c.color}">${xp.toFixed(1)}</span>
        <span class="sc-gauge-max">/ ${max} XP</span>
        <span class="sc-gauge-pct">${pct}%</span>
      </div>

      <div class="sc-gauge-bar-wrap" title="${xp.toFixed(1)} / ${max} XP">
        <div class="sc-gauge-track">
          ${rankSegments.map((seg, i) => `
            <div class="sc-gauge-seg" style="width:${seg.segWidth}%;position:relative">
              <div class="sc-gauge-seg-fill" style="width:${seg.segPct}%;background:${c.color};opacity:${0.3+i*0.1}"></div>
              ${i < rankSegments.length-1 ? `<div class="sc-gauge-tick"></div>` : ''}
            </div>
          `).join('')}
        </div>
        <div class="sc-gauge-fill-overlay" style="width:${pct}%;background:linear-gradient(90deg,${c.color}88,${c.color})"></div>
      </div>

      <div class="sc-gauge-rank-labels">
        ${RANKS.map((r,i)=>`<span class="sc-gauge-rank-lbl" style="opacity:${i<=ridx?1:.3};${i===ridx?`color:${c.color};font-weight:700`:''}">${r.name.slice(0,3)}</span>`).join('')}
      </div>

      <div class="sc-rank-steps">
        ${RANKS.map((r,i) => {
          const isCur = i === ridx, isDone = i < ridx;
          return `<div class="sc-rank-pip ${isCur?'cur':''} ${isDone?'done':''}" style="${isCur?`background:${c.color};border-color:${c.color}`:isDone?`background:${c.color}55;border-color:${c.color}88`:''}">
            <div class="sc-pip-tooltip">${r.name}<br>${i===0?'0 XP':`${thresh[i][0]}–${thresh[i][1]} XP`}</div>
          </div>`;
        }).join('')}
      </div>

      ${ridx < RANKS.length - 1
        ? `<div class="sc-card-next">encore <b style="color:${c.color}">${toNext.toFixed(1)} XP</b> pour <span class="rank-badge ${nextRank.cls}" style="font-size:10px;padding:1px 6px">${nextRank.name}</span></div>`
        : `<div class="sc-card-next" style="color:var(--gold)">🏆 Rang maximum atteint !</div>`}
    </div>`;
  });

  h += `</div>
  <p style="margin-top:6px;font-size:11px;color:var(--text3);text-align:center">Les seuils se recalculent selon le nombre de tâches actives.</p>`;

  document.getElementById('tab-scores').innerHTML = h;
}

      </div>
      <div class="cat-edit-inline" id="cedit-${idx}" style="display:none">

      </div>
    </div>`;
  });

  // Color picker popup (hidden, revealed via JS)
  h += `</div>
    <div id="color-picker-popup" class="color-picker-popup-new" style="display:none">
      <div class="cp-title">Couleur pour <b id="color-picker-cat-name"></b></div>
      <div class="cp-swatches" id="color-preset-row"></div>
      <div class="cp-custom-row">
        <label>Personnalisée</label>
        <input type="color" id="color-picker-custom" style="width:32px;height:28px;border:none;background:none;cursor:pointer;padding:0;border-radius:4px"/>
        <div id="color-preview" style="width:32px;height:28px;border-radius:6px;border:1px solid var(--border2)"></div>
        <div class="cp-btns">

        </div>

    </div>
  </div>`;

  // ── Section: Ajouter une tâche ─────────────────────────

    <div class="manage-section-title">
      <span>Nouvelle tâche</span>
    </div>
    <div class="manage-add-form">
      <input id="new-task-name" type="text" placeholder="Nom de la tâche…" onkeydown="if(event.key==='Enter')addTask()"/>
      <select id="new-task-cat">${catKeys.map(c=>`<option>${c}</option>`).join('')}</select>

  // ── Section: Tâches par catégorie ──────────────────────

    const catTasks = tasks.filter(t => t.cat === cat);
    const c = CATS[cat];
    h += `<div class="manage-cat-block">
      <div class="manage-cat-header" style="border-left-color:${c.color}">
        <h3 style="color:${c.color}">${cat}</h3>
        <span class="cat-pill" style="${catPillStyle(cat)}">${catTasks.length} tâche${catTasks.length!==1?'s':''} · max ${catMax(cat)} XP/sem</span>
      </div>
      <div class="manage-task-list">`;
    if (catTasks.length === 0) {
      h += `<div class="manage-empty-cat">Aucune tâche dans cette catégorie</div>`;
    } else {
      catTasks.forEach(t => {
        h += `<div class="manage-row">
          <div class="task-name">${t.name}</div>
          <select onchange="changeTaskCat(${t.id},this.value)">
            ${catKeys.map(c2=>`<option${c2===t.cat?' selected':''}>${c2}</option>`).join('')}
